###############################################################################
# VedaAI — Render Blueprint (render.yaml)
# Docs: https://render.com/docs/blueprint-spec
#
# Services defined:
#   1. veda-ai-backend   — Express/TypeScript API + BullMQ Worker (port 5000)
#   2. veda-ai-frontend  — Next.js 14 SSR web application (port 3000)
#   3. veda-ai-redis     — Render Managed Redis (used by BullMQ)
#
# MongoDB: uses your existing MongoDB Atlas cluster (external).
# Set MONGODB_URI and GROQ_API_KEY / OPENAI_API_KEY in Render's dashboard
# or add them as secret environment variables below before deploying.
###############################################################################

services:

  # ---------------------------------------------------------------------------
  # 1. Backend — Node.js / Express / TypeScript API
  # ---------------------------------------------------------------------------
  - type: web
    name: veda-ai-backend
    runtime: node
    region: oregon            # Change to "frankfurt" or "singapore" if preferred
    plan: free                # Upgrade to "starter" for always-on service

    # Build settings
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start

    # Health-check — Render uses this to confirm service is alive
    healthCheckPath: /health

    # Expose the port Express listens on
    envVars:
      - key: PORT
        value: "5000"

      - key: NODE_ENV
        value: production

      # ── MongoDB Atlas ────────────────────────────────────────────────────────
      # Replace this value with your own Atlas connection string, or better yet
      # manage it as a secret in the Render dashboard (Environment → Secret Files).
      - key: MONGODB_URI
        sync: false           # "sync: false" means you must set it in the dashboard

      # ── AI Keys ─────────────────────────────────────────────────────────────
      # Provide at least ONE of the two keys below.
      # Groq is preferred for speed; OpenAI is used as fallback.
      - key: GROQ_API_KEY
        sync: false           # Set via Render dashboard → Environment

      - key: OPENAI_API_KEY
        sync: false           # Set via Render dashboard → Environment

      # ── Redis (auto-linked from the managed Redis instance below) ────────────
      - key: REDIS_URL
        fromService:
          name: veda-ai-redis
          type: redis
          property: connectionString

  # ---------------------------------------------------------------------------
  # 2. Frontend — Next.js 14 (App Router, SSR)
  # ---------------------------------------------------------------------------
  - type: web
    name: veda-ai-frontend
    runtime: node
    region: oregon

    plan: free

    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start

    envVars:
      - key: PORT
        value: "3000"

      - key: NODE_ENV
        value: production

      # Point the frontend at the deployed backend service URL.
      # Render injects the public URL of veda-ai-backend automatically.
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: veda-ai-backend
          type: web
          property: host
          # Render returns the host without protocol; prefix it here:
          envVarPrefix: "https://"
        # Fallback: you can also hard-code it after first deploy, e.g.:
        # value: "https://veda-ai-backend.onrender.com"

      - key: NEXT_PUBLIC_WS_URL
        fromService:
          name: veda-ai-backend
          type: web
          property: host
          envVarPrefix: "https://"
        # Socket.io auto-upgrades the https:// connection to wss://.

  # ---------------------------------------------------------------------------
  # 3. Managed Redis (used by BullMQ job queue)
  # ---------------------------------------------------------------------------
  - type: redis
    name: veda-ai-redis
    region: oregon
    plan: free                # Free tier: 25 MB RAM, no persistence
    ipAllowList: []           # Allow all internal Render service connections
