###############################################################################
# VedaAI — Render Blueprint (render.yaml)
# Docs: https://render.com/docs/blueprint-spec
#
# Services defined:
#   1. veda-ai-backend   — Express/TypeScript API + BullMQ Worker (port 5000)
#   2. veda-ai-frontend  — Next.js 14 SSR web application (port 3000)
#   3. veda-ai-redis     — Render Managed Redis (used by BullMQ)
#
# MongoDB: uses your existing MongoDB Atlas cluster (external).
#
# ⚠️  BEFORE CLICKING "Apply Blueprint", go to each service → Environment and
#     fill in every variable marked with sync: false (they are secrets).
###############################################################################

services:

  # ---------------------------------------------------------------------------
  # 1. Backend — Node.js / Express / TypeScript API
  # ---------------------------------------------------------------------------
  - type: web
    name: veda-ai-backend
    runtime: node
    region: oregon            # Change to frankfurt or singapore if preferred
    plan: free                # Upgrade to starter for always-on service

    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start

    # Render uses this path to decide when the service is healthy
    healthCheckPath: /health

    envVars:
      - key: PORT
        value: "5000"

      - key: NODE_ENV
        value: production

      # ── MongoDB Atlas ────────────────────────────────────────────────────────
      # Set this in Render Dashboard → veda-ai-backend → Environment
      - key: MONGODB_URI
        sync: false

      # ── AI Keys ─────────────────────────────────────────────────────────────
      # Provide at least ONE. Groq is preferred (faster & free-tier friendly).
      - key: GROQ_API_KEY
        sync: false

      - key: OPENAI_API_KEY
        sync: false

      # ── Redis ────────────────────────────────────────────────────────────────
      # Auto-injected from the managed Redis instance below
      - key: REDIS_URL
        fromService:
          name: veda-ai-redis
          type: redis
          property: connectionString

  # ---------------------------------------------------------------------------
  # 2. Frontend — Next.js 14 (App Router, SSR)
  # ---------------------------------------------------------------------------
  - type: web
    name: veda-ai-frontend
    runtime: node
    region: oregon
    plan: free

    rootDir: frontend

    # NODE_OPTIONS limits heap to 460 MB to stay within Render's 512 MB free
    # tier RAM and prevent the silent OOM that surfaces as "webpack errors".
    buildCommand: |
      export NODE_OPTIONS="--max-old-space-size=460" && npm install && npm run build

    startCommand: npm run start

    envVars:
      - key: PORT
        value: "3000"

      - key: NODE_ENV
        value: production

      # ── Backend URL ──────────────────────────────────────────────────────────
      # After the backend service is first deployed, copy its public URL from
      # the Render Dashboard and paste it here (without a trailing slash).
      # Example: https://veda-ai-backend.onrender.com
      - key: NEXT_PUBLIC_API_URL
        sync: false

      # Socket.io upgrades https:// to wss:// automatically — use the same URL.
      - key: NEXT_PUBLIC_WS_URL
        sync: false

  # ---------------------------------------------------------------------------
  # 3. Managed Redis — backing store for BullMQ job queue
  # ---------------------------------------------------------------------------
  - type: redis
    name: veda-ai-redis
    region: oregon
    plan: free          # Free tier: 25 MB RAM, no persistence
    ipAllowList: []     # Empty = allow all internal Render connections only
